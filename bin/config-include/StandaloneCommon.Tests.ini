; FOR TEST RUNS ONLY -- DO NOT USE IN PRODUCTION
; This file contains overrides that make local standalone test runs reproducible.

[DatabaseService]
    ; Keep local test runs self-contained by default.
    Include-Storage = "config-include/storage/SQLiteStandalone.ini"

[Modules]
    ; Keep cache enabled for module compatibility during tests.
    AssetCaching = "FlotsamAssetCache"
    Include-FlotsamCache = "config-include/FlotsamCache.ini"

[LoginService]
    ; Deterministic welcome output for test environments.
    WelcomeMessage = "Welcome, Test Avatar!"
